<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <title>Frontend Mentor | QR code component</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <main>
    <article aria-labelledby="card-heading"> 
      <img src="images/image-qr-code.png" alt="QR code linking to Frontend Mentor">
      <h1 id="card-heading">Improve your <strong>front-end</strong> skills by building projects</h1>
      <p>Scan the <abbr title="Quick Response Code" aria-label="Quick Response Code">QR code</abbr> to visit <a rel="noopener noreferrer" href="https://www.frontendmentor.io/" target="_blank">Frontend Mentor</a> and take your coding skills to the next level</p>
    </article>
  </main>
  
  <footer class="attribution">
    Challenge by <a target="_blank" href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a target="_blank" href="https://github.com/arshiya-sr">arshiya_sr</a>.
  </footer>
</body>
</html>
